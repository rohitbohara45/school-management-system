<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers — School Management</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>SchoolMS</h2><small>Admin Panel</small>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
        <a href="classes.html">Classes</a>
        <a href="subjects.html">Subjects</a>
        <a href="exams.html">Exams</a>
        <a href="marks.html">Marks</a>
        <a href="attendance.html">Attendance</a>
        <a href="fees.html">Fees</a>
        <a href="notices.html">Notices</a>
        <a href="timetable.html">Timetable</a>
        <a href="promotion.html">Promotion</a>
      </nav>
      <div class="sidebar-footer">
        <span id="adminName">Admin</span>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1>Teachers</h1>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Teacher</button>
      </div>
      <div class="card">
        <div class="card-header">
          <h2 id="teacherCount">All Teachers</h2>
        </div>
        <div id="teachersTable">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Teacher</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fieldName" placeholder="e.g. Alice Johnson">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="fieldEmail" placeholder="teacher@school.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="fieldPhone" placeholder="98XXXXXXXX">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="fieldSubject" placeholder="e.g. Mathematics">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveTeacher()">Save Teacher</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    requireAuth();
    document.getElementById('adminName').textContent = localStorage.getItem('adminName') || 'Admin';
    let editingId = null;

    async function loadTeachers() {
      try {
        const res = await TeachersAPI.getAll();
        const teachers = res.data;
        document.getElementById('teacherCount').textContent = `All Teachers (${teachers.length})`;
        if (!teachers.length) {
          document.getElementById('teachersTable').innerHTML = '<div class="loading">No teachers found.</div>';
          return;
        }
        const rows = teachers.map(t => `
        <tr>
          <td>${t.id}</td>
          <td><strong>${t.name}</strong></td>
          <td>${t.email || '—'}</td>
          <td>${t.phone || '—'}</td>
          <td>${t.subject || '—'}</td>
          <td>${t.class_count} class(es)</td>
          <td>
            <button class="btn btn-sm btn-edit"   onclick="openEditModal(${t.id})">Edit</button>
            <button class="btn btn-sm btn-delete" onclick="deleteTeacher(${t.id},'${t.name}')">Delete</button>
          </td>
        </tr>`).join('');
        document.getElementById('teachersTable').innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Subject</th><th>Classes</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      } catch (err) {
        document.getElementById('teachersTable').innerHTML = '<div class="loading">Failed to load.</div>';
      }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Teacher';
      document.getElementById('saveBtn').textContent = 'Save Teacher';
      ['fieldName', 'fieldEmail', 'fieldPhone', 'fieldSubject'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function openEditModal(id) {
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Teacher';
      document.getElementById('saveBtn').textContent = 'Update Teacher';
      try {
        const res = await TeachersAPI.getOne(id);
        const t = res.data;
        document.getElementById('fieldName').value = t.name || '';
        document.getElementById('fieldEmail').value = t.email || '';
        document.getElementById('fieldPhone').value = t.phone || '';
        document.getElementById('fieldSubject').value = t.subject || '';
        document.getElementById('modalOverlay').classList.add('open');
      } catch (err) { showToast('Failed to load teacher', 'error'); }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    async function saveTeacher() {
      const name = document.getElementById('fieldName').value.trim();
      const email = document.getElementById('fieldEmail').value.trim();
      const phone = document.getElementById('fieldPhone').value.trim();
      const subject = document.getElementById('fieldSubject').value.trim();
      if (!name) { showToast('Name is required', 'error'); return; }
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        if (editingId) {
          await TeachersAPI.update(editingId, { name, email, phone, subject });
          showToast('Teacher updated');
        } else {
          await TeachersAPI.create({ name, email, phone, subject });
          showToast('Teacher added');
        }
        closeModal(); loadTeachers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? 'Update Teacher' : 'Save Teacher';
      }
    }

    async function deleteTeacher(id, name) {
      if (!confirm(`Delete teacher "${name}"?`)) return;
      try {
        await TeachersAPI.delete(id);
        showToast('Teacher deleted');
        loadTeachers();
      } catch (err) { showToast(err.message, 'error'); }
    }

    function handleLogout() { removeToken(); window.location.href = 'login.html'; }
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    loadTeachers();
  </script>
</body>

</html>
