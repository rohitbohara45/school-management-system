<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects — SchoolMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>SchoolMS</h2><small>Admin Panel</small>
            </div>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="students.html">Students</a>
                <a href="teachers.html">Teachers</a>
                <a href="classes.html">Classes</a>
                <a href="subjects.html" class="active">Subjects</a>
                <a href="exams.html">Exams</a>
                <a href="marks.html">Marks</a>
                <a href="attendance.html">Attendance</a>
                <a href="fees.html">Fees</a>
                <a href="notices.html">Notices</a>
                <a href="timetable.html">Timetable</a>
                <a href="promotion.html">Promotion</a>
            </nav>
            <div class="sidebar-footer">
                <span id="adminName">Admin</span>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Subjects</h1>
                <button class="btn btn-primary" onclick="openAddModal()">
                    + Add Subject
                </button>
            </div>

            <!-- Filter by class -->
            <div class="card mb-3" style="padding:16px;">
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <label style="font-size:13px;font-weight:500;color:#374151;">
                        Filter by class:
                    </label>
                    <select id="classFilter" onchange="loadSubjects()" style="padding:7px 12px;border:1px solid #d1d5db;border-radius:7px;
                 font-size:13px;min-width:180px;">
                        <option value="">All Classes</option>
                    </select>
                    <span id="subjectCount" style="font-size:13px;color:#64748b;margin-left:auto;">
                    </span>
                </div>
            </div>

            <div class="card">
                <div id="subjectsTable">
                    <div class="loading">Loading subjects...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add Subject</h2>

            <div class="form-group">
                <label>Class *</label>
                <select id="fieldClass">
                    <option value="">— Select class —</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Subject Name *</label>
                    <input type="text" id="fieldName" placeholder="e.g. Mathematics">
                </div>
                <div class="form-group">
                    <label>Subject Code *
                        <span style="font-size:11px;color:#94a3b8;">(unique per class)</span>
                    </label>
                    <input type="text" id="fieldCode" placeholder="e.g. MATH"
                        oninput="this.value=this.value.toUpperCase()">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Full Marks</label>
                    <input type="number" id="fieldFullMarks" value="100" min="1" max="1000">
                </div>
                <div class="form-group">
                    <label>Pass Marks</label>
                    <input type="number" id="fieldPassMarks" value="40" min="1">
                </div>
            </div>

            <div class="form-group">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="fieldOptional" style="width:16px;height:16px;">
                    <span>Optional subject</span>
                </label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="saveBtn" onclick="saveSubject()">
                    Save Subject
                </button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        requireAuth();
        document.getElementById('adminName').textContent =
            localStorage.getItem('adminName') || 'Admin';

        let allSubjects = [];
        let editingId = null;

        async function loadSubjects() {
            const classId = document.getElementById('classFilter').value;
            try {
                const res = await SubjectsAPI.getAll(classId || null);
                allSubjects = res.data;
                document.getElementById('subjectCount').textContent =
                    `${allSubjects.length} subject(s)`;
                renderTable(allSubjects);
            } catch (err) {
                document.getElementById('subjectsTable').innerHTML =
                    '<div class="loading">Failed to load subjects.</div>';
            }
        }

        function renderTable(subjects) {
            if (!subjects.length) {
                document.getElementById('subjectsTable').innerHTML =
                    '<div class="loading">No subjects found. Click "+ Add Subject" to create one.</div>';
                return;
            }

            // Group by class
            const grouped = {};
            subjects.forEach(s => {
                const key = `${s.class_name} - ${s.class_section}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(s);
            });

            let html = '';
            Object.entries(grouped).forEach(([className, subs]) => {
                const rows = subs.map(s => `
        <tr>
          <td style="padding:10px 16px;">
            <strong>${s.name}</strong>
            ${s.is_optional
                        ? '<span class="badge" style="background:#fffbeb;color:#d97706;border:1px solid #fde68a;font-size:10px;padding:2px 7px;border-radius:20px;margin-left:6px;">Optional</span>'
                        : ''}
          </td>
          <td style="padding:10px 16px;">
            <code style="background:#f1f5f9;padding:2px 8px;border-radius:4px;
                         font-size:12px;color:#2563eb;">${s.code}</code>
          </td>
          <td style="padding:10px 16px;">${s.full_marks}</td>
          <td style="padding:10px 16px;">${s.pass_marks}</td>
          <td style="padding:10px 16px;">
            <button class="btn btn-sm btn-edit" onclick="openEditModal(${s.id})">
              Edit
            </button>
            <button class="btn btn-sm btn-delete"
              onclick="deleteSubject(${s.id},'${s.name}')">
              Delete
            </button>
          </td>
        </tr>
      `).join('');

                html += `
        <div style="padding:10px 16px 4px;background:#f8fafc;
                    border-bottom:1px solid #e8ecf0;">
          <span style="font-size:12px;font-weight:700;color:#1e2a3a;
                       text-transform:uppercase;letter-spacing:0.5px;">
            ${className}
          </span>
          <span style="font-size:11px;color:#64748b;margin-left:8px;">
            ${subs.length} subjects
          </span>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
          <thead>
            <tr style="background:#f8fafc;">
              <th style="padding:8px 16px;text-align:left;font-size:12px;
                         color:#64748b;font-weight:600;border-bottom:1px solid #e8ecf0;">
                Subject
              </th>
              <th style="padding:8px 16px;text-align:left;font-size:12px;
                         color:#64748b;font-weight:600;border-bottom:1px solid #e8ecf0;">
                Code
              </th>
              <th style="padding:8px 16px;text-align:left;font-size:12px;
                         color:#64748b;font-weight:600;border-bottom:1px solid #e8ecf0;">
                Full Marks
              </th>
              <th style="padding:8px 16px;text-align:left;font-size:12px;
                         color:#64748b;font-weight:600;border-bottom:1px solid #e8ecf0;">
                Pass Marks
              </th>
              <th style="padding:8px 16px;text-align:left;font-size:12px;
                         color:#64748b;font-weight:600;border-bottom:1px solid #e8ecf0;">
                Actions
              </th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
            });

            document.getElementById('subjectsTable').innerHTML = html;
        }

        async function loadClassOptions(selectedId = null) {
            try {
                const res = await ClassesAPI.getAll();
                const opts = res.data.map(c =>
                    `<option value="${c.id}" ${c.id == selectedId ? 'selected' : ''}>
          ${c.name} - ${c.section}
        </option>`
                ).join('');
                const placeholder = '<option value="">— Select class —</option>';

                document.getElementById('fieldClass').innerHTML = placeholder + opts;
                document.getElementById('classFilter').innerHTML =
                    '<option value="">All Classes</option>' + opts;
            } catch (err) {
                showToast('Could not load classes', 'error');
            }
        }

        async function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Subject';
            document.getElementById('saveBtn').textContent = 'Save Subject';
            document.getElementById('fieldName').value = '';
            document.getElementById('fieldCode').value = '';
            document.getElementById('fieldFullMarks').value = '100';
            document.getElementById('fieldPassMarks').value = '40';
            document.getElementById('fieldOptional').checked = false;
            await loadClassOptions();
            document.getElementById('modalOverlay').classList.add('open');
        }

        async function openEditModal(id) {
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Subject';
            document.getElementById('saveBtn').textContent = 'Update Subject';
            try {
                const res = await SubjectsAPI.getOne(id);
                const s = res.data;
                await loadClassOptions(s.class_id);
                document.getElementById('fieldClass').value = s.class_id;
                document.getElementById('fieldClass').disabled = true;
                document.getElementById('fieldName').value = s.name;
                document.getElementById('fieldCode').value = s.code;
                document.getElementById('fieldFullMarks').value = s.full_marks;
                document.getElementById('fieldPassMarks').value = s.pass_marks;
                document.getElementById('fieldOptional').checked = !!s.is_optional;
                document.getElementById('modalOverlay').classList.add('open');
            } catch (err) {
                showToast('Failed to load subject', 'error');
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.getElementById('fieldClass').disabled = false;
        }

        async function saveSubject() {
            const class_id = document.getElementById('fieldClass').value;
            const name = document.getElementById('fieldName').value.trim();
            const code = document.getElementById('fieldCode').value.trim();
            const full_marks = parseInt(document.getElementById('fieldFullMarks').value);
            const pass_marks = parseInt(document.getElementById('fieldPassMarks').value);
            const is_optional = document.getElementById('fieldOptional').checked ? 1 : 0;

            if (!name) { showToast('Subject name is required', 'error'); return; }
            if (!code) { showToast('Subject code is required', 'error'); return; }
            if (!class_id) { showToast('Please select a class', 'error'); return; }
            if (pass_marks >= full_marks) {
                showToast('Pass marks must be less than full marks', 'error'); return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                if (editingId) {
                    await SubjectsAPI.update(editingId, {
                        name, code, full_marks, pass_marks, is_optional
                    });
                    showToast('Subject updated');
                } else {
                    await SubjectsAPI.create({
                        name, code, class_id, full_marks, pass_marks, is_optional
                    });
                    showToast('Subject added');
                }
                closeModal();
                loadSubjects();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = editingId ? 'Update Subject' : 'Save Subject';
            }
        }

        async function deleteSubject(id, name) {
            if (!confirm(`Delete subject "${name}"?\nThis will fail if marks exist for this subject.`))
                return;
            try {
                await SubjectsAPI.delete(id);
                showToast('Subject deleted');
                loadSubjects();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function handleLogout() {
            removeToken();
            window.location.href = 'login.html';
        }

        document.getElementById('modalOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        loadClassOptions().then(() => loadSubjects());
    </script>
</body>

</html>
