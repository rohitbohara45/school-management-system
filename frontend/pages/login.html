<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SchoolMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .login-outer {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      display: flex;
      min-height: 520px;
    }

    .login-left {
      background: linear-gradient(135deg, #1e2a3a 0%, #0f4c75 100%);
      color: #fff;
      padding: 48px 40px;
      width: 45%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: #2563eb;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
    }

    .login-left h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .login-left p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.7;
    }

    .login-feature {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    .login-feature i {
      color: #60a5fa;
      font-size: 15px;
    }

    .login-right {
      flex: 1;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .role-tabs {
      display: flex;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 2px;
    }

    .role-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .role-tab.active {
      background: #fff;
      color: #1e2a3a;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .login-right h3 {
      font-size: 22px;
      font-weight: 700;
      color: #1e2a3a;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
      display: block;
    }

    .form-control {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 14px;
      transition: border 0.2s;
      box-sizing: border-box;
      margin-bottom: 16px;
      font-family: inherit;
    }

    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      outline: none;
    }

    .btn-signin {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
      font-family: inherit;
    }

    .btn-signin:hover {
      background: #1d4ed8;
    }

    .btn-signin:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .error-box {
      background: #fff5f5;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .forgot-link {
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
      float: right;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
    }

    .back-link a {
      color: #2563eb;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 32px 24px;
      }

      .login-outer {
        max-width: 420px;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-outer">

      <!-- Left panel -->
      <div class="login-left">
        <div>
          <div class="brand">
            <div class="brand-icon">🏫</div>
            <div class="brand-name">SchoolMS</div>
          </div>
          <h2>School Management System</h2>
          <p>A complete platform to manage students, teachers, attendance, and academic records.</p>
        </div>
        <div>
          <div class="login-feature">
            <i class="bi bi-shield-check"></i> Secured with JWT authentication
          </div>
          <div class="login-feature">
            <i class="bi bi-people"></i> Student and Teacher portals
          </div>
          <div class="login-feature">
            <i class="bi bi-graph-up"></i> Live attendance and grade tracking
          </div>
          <div class="login-feature">
            <i class="bi bi-file-earmark-pdf"></i> PDF report cards
          </div>
        </div>
      </div>

      <!-- Right panel -->
      <div class="login-right">

        <!-- Role tabs -->
        <div class="role-tabs">
          <button class="role-tab active" id="tabAdmin" onclick="setRole('admin')">
            <i class="bi bi-shield-lock"></i> Admin
          </button>
          <button class="role-tab" id="tabTeacher" onclick="setRole('teacher')">
            <i class="bi bi-person-badge"></i> Teacher
          </button>
          <button class="role-tab" id="tabStudent" onclick="setRole('student')">
            <i class="bi bi-mortarboard"></i> Student
          </button>
        </div>

        <h3 id="loginTitle">Admin Login</h3>
        <p class="subtitle" id="loginSubtitle">Sign in to manage your school</p>

        <div class="error-box" id="errorBox"></div>

        <div>
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="emailInput" placeholder="admin@school.com">
        </div>

        <div>
          <label class="form-label">
            Password
            <a href="forgot-password.html" class="forgot-link">
              Forgot password?
            </a>
          </label>
          <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password">
        </div>

        <button class="btn-signin" id="signinBtn" onclick="handleLogin()">
          Sign in
        </button>

        <div class="back-link">
          <a href="../index.html">← Back to home</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────
    const API_BASE = 'http://localhost:5000/api';

    const roleConfig = {
      admin: {
        title: 'Admin Login',
        subtitle: 'Sign in to manage your school',
        placeholder: 'admin@school.com'
      },
      teacher: {
        title: 'Teacher Login',
        subtitle: 'Sign in to your teacher portal',
        placeholder: 'alice@school.com'
      },
      student: {
        title: 'Student Login',
        subtitle: 'View your grades and attendance',
        placeholder: 'ravi@example.com'
      }
    };

    let currentRole = 'admin';

    // ── Role switcher ─────────────────────────────────────────
    function setRole(role) {
      currentRole = role;

      // Update tab styles
      ['admin', 'teacher', 'student'].forEach(r => {
        document.getElementById(`tab${r.charAt(0).toUpperCase() + r.slice(1)}`)
          .classList.remove('active');
      });
      document.getElementById(
        `tab${role.charAt(0).toUpperCase() + role.slice(1)}`
      ).classList.add('active');

      // Update text
      const cfg = roleConfig[role];
      document.getElementById('loginTitle').textContent = cfg.title;
      document.getElementById('loginSubtitle').textContent = cfg.subtitle;
      document.getElementById('emailInput').placeholder = cfg.placeholder;

      // Clear fields
      document.getElementById('emailInput').value = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('errorBox').style.display = 'none';
    }

    // ── Redirect if already logged in ─────────────────────────
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
    if (localStorage.getItem('studentToken')) {
      window.location.href = 'student-dashboard.html';
    }
    if (localStorage.getItem('teacherToken')) {
      window.location.href = 'teacher-dashboard.html';
    }

    // ── Enter key ─────────────────────────────────────────────
    document.getElementById('passwordInput')
      .addEventListener('keydown', function (e) {
        if (e.key === 'Enter') handleLogin();
      });

    // ── Main login function ───────────────────────────────────
    async function handleLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('signinBtn');

      errorBox.style.display = 'none';

      if (!email) {
        showErr('Please enter your email address.');
        return;
      }
      if (!password) {
        showErr('Please enter your password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        if (currentRole === 'admin') {
          await loginAsAdmin(email, password);
        } else if (currentRole === 'teacher') {
          await loginAsTeacher(email, password);
        } else if (currentRole === 'student') {
          await loginAsStudent(email, password);
        }
      } catch (err) {
        showErr(err.message || 'Login failed. Check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    // ── Admin login ───────────────────────────────────────────
    async function loginAsAdmin(email, password) {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Admin login failed');

      localStorage.setItem('token', data.token);
      localStorage.setItem('adminName', data.admin.name);
      window.location.href = 'dashboard.html';
    }

    // ── Teacher login ─────────────────────────────────────────
    async function loginAsTeacher(email, password) {
      const res = await fetch(`${API_BASE}/teacher/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Teacher login failed');

      localStorage.setItem('teacherToken', data.token);
      localStorage.setItem('teacherName', data.teacher.name);
      localStorage.setItem('teacherData', JSON.stringify(data.teacher));
      window.location.href = 'teacher-dashboard.html';
    }

    // ── Student login ─────────────────────────────────────────
    async function loginAsStudent(email, password) {
      const res = await fetch(`${API_BASE}/student/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Student login failed');

      localStorage.setItem('studentToken', data.token);
      localStorage.setItem('studentName', data.student.name);
      localStorage.setItem('studentData', JSON.stringify(data.student));
      window.location.href = 'student-dashboard.html';
    }

    // ── Show error ────────────────────────────────────────────
    function showErr(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
  </script>

</body>

</html>
